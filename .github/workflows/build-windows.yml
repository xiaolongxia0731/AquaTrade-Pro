name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
        pip install akshare --upgrade
    
    - name: Build EXE
      run: |
        python -m PyInstaller --clean --onedir --windowed --name AquaTrade-Pro --collect-all vnpy_ctp --collect-all talib --collect-all akshare --collect-all numpy --collect-all pandas --collect-all matplotlib --add-data "config_manager.py;." --add-data "factor_engine.py;." --add-data "symbol_scanner.py;." --add-data "factor_panels.py;." --add-data "data_provider.py;." main_gui.py
    
    - name: Create ZIP
      run: |
        Compress-Archive -Path "dist\AquaTrade-Pro" -DestinationPath "AquaTrade-Pro-Windows.zip"
    
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: AquaTrade-Pro-Windows
        path: AquaTrade-Pro-Windows.zip
