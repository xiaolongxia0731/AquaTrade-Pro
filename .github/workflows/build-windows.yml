name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build EXE with PyInstaller
      run: |
        python -m PyInstaller --clean --onedir --windowed --name AquaTrade-Pro --collect-all vnpy_ctp --collect-all talib --collect-all akshare --add-data "config_manager.py;." --add-data "factor_engine.py;." --add-data "symbol_scanner.py;." --add-data "factor_panels.py;." --add-data "data_provider.py;." main_gui.py
    
    - name: Create ZIP archive
      run: |
        Compress-Archive -Path "dist\AquaTrade-Pro" -DestinationPath "AquaTrade-Pro-Windows.zip"
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: AquaTrade-Pro-Windows
        path: AquaTrade-Pro-Windows.zip
    
    - name: Create Release
      if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: AquaTrade-Pro-Windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
